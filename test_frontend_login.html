<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Redirect Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Login Redirect Test</h1>
    <p>This test verifies that the LoginPage correctly decodes JWT and redirects based on role.</p>

    <div class="test-section">
        <h2>Test 1: Admin Login</h2>
        <button onclick="testAdminLogin()">Test Admin Login</button>
        <div id="admin-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: Patient Login</h2>
        <button onclick="testPatientLogin()">Test Patient Login</button>
        <div id="patient-result"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';

        function decodeJWT(token) {
            try {
                const payload = token.split('.')[1];
                const decoded = JSON.parse(atob(payload));
                return decoded;
            } catch (error) {
                return { error: error.message };
            }
        }

        async function testAdminLogin() {
            const resultDiv = document.getElementById('admin-result');
            resultDiv.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    const decoded = decodeJWT(data.access);
                    const userRole = decoded.role || data.role || 'patient';
                    const expectedRedirect = userRole === 'admin' ? '/admin/dashboard' : '/patient/dashboard';
                    
                    const isSuccess = userRole === 'admin' && expectedRedirect === '/admin/dashboard';
                    
                    resultDiv.className = isSuccess ? 'success' : 'error';
                    resultDiv.innerHTML = `
                        <h3>${isSuccess ? '✅ PASS' : '❌ FAIL'}</h3>
                        <p><strong>Response Role:</strong> ${data.role}</p>
                        <p><strong>Decoded JWT Role:</strong> ${decoded.role}</p>
                        <p><strong>Expected Redirect:</strong> ${expectedRedirect}</p>
                        <p><strong>Status:</strong> ${isSuccess ? 'Correct redirect for admin' : 'Incorrect redirect'}</p>
                        <details>
                            <summary>Full JWT Payload</summary>
                            <pre>${JSON.stringify(decoded, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<h3>❌ FAIL</h3><p>Login failed: ${data.detail || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<h3>❌ ERROR</h3><p>${error.message}</p>`;
            }
        }

        async function testPatientLogin() {
            const resultDiv = document.getElementById('patient-result');
            resultDiv.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'patient1',
                        password: 'patient123'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    const decoded = decodeJWT(data.access);
                    const userRole = decoded.role || data.role || 'patient';
                    const expectedRedirect = userRole === 'admin' ? '/admin/dashboard' : '/patient/dashboard';
                    
                    const isSuccess = userRole === 'patient' && expectedRedirect === '/patient/dashboard';
                    
                    resultDiv.className = isSuccess ? 'success' : 'error';
                    resultDiv.innerHTML = `
                        <h3>${isSuccess ? '✅ PASS' : '❌ FAIL'}</h3>
                        <p><strong>Response Role:</strong> ${data.role}</p>
                        <p><strong>Decoded JWT Role:</strong> ${decoded.role}</p>
                        <p><strong>Expected Redirect:</strong> ${expectedRedirect}</p>
                        <p><strong>Status:</strong> ${isSuccess ? 'Correct redirect for patient' : 'Incorrect redirect'}</p>
                        <details>
                            <summary>Full JWT Payload</summary>
                            <pre>${JSON.stringify(decoded, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<h3>❌ FAIL</h3><p>Login failed: ${data.detail || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<h3>❌ ERROR</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
